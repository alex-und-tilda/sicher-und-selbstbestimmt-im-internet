<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Entwurf – Sprach-Abfrage</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#f4f8fc;--bg2:#e7eef7;--surface:#fff;--ink:#142231;--ink-soft:#46586f;
  --line:#dbe4ef;--accent:#0a5c95;--accent-dark:#073f68;--accent-soft:#e6f0f9;
  --good:#15803d;--good-bg:#e8f6ee;--radius-l:24px;--radius-m:16px;
  --shadow:0 1px 2px rgba(20,34,49,.04),0 10px 30px rgba(20,34,49,.08);--shadow-s:0 1px 3px rgba(20,34,49,.07);
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Atkinson Hyperlegible",Arial,sans-serif;color:var(--ink);line-height:1.6;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));padding:24px;min-height:100vh;}
.wrap{max-width:760px;margin:0 auto;}
.brandbar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-m);padding:12px 18px;box-shadow:var(--shadow-s);margin-bottom:16px;}
.brandbar .mark{font-weight:700;}
.brandbar .mark small{display:block;font-weight:400;font-size:.8rem;color:var(--ink-soft);}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-l);
  padding:30px 28px;box-shadow:var(--shadow);}
h1{font-size:1.5rem;margin:0 0 8px;}
.sub{color:var(--ink-soft);margin:0 0 22px;}
.choose-row{display:flex;flex-direction:column;gap:14px;}
.big{display:flex;align-items:center;gap:14px;text-align:left;background:var(--surface);border:2px solid var(--line);
  border-radius:var(--radius-l);padding:18px 20px;cursor:pointer;font:inherit;color:var(--ink);width:100%;
  box-shadow:var(--shadow-s);transition:transform .15s,box-shadow .15s,border-color .15s;}
.big:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent);}
.big .ic{flex:none;width:52px;height:52px;border-radius:14px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);}
.big .ic svg{width:28px;height:28px;}
.big strong{display:block;font-size:1.15rem;}
.big span{color:var(--ink-soft);font-size:.95rem;}
.ghost{margin-top:16px;background:none;border:none;color:var(--accent-dark);font:inherit;font-weight:700;cursor:pointer;text-decoration:underline;}
.dots{display:flex;gap:8px;justify-content:center;margin:0 0 18px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--accent);}
.qh{font-size:1.35rem;margin:0 0 18px;text-align:center;}
.answers{display:flex;flex-direction:column;gap:12px;}
.ans{text-align:left;background:var(--surface);border:2px solid var(--line);border-radius:var(--radius-m);
  padding:16px 18px;cursor:pointer;font:inherit;font-weight:700;color:var(--ink);min-height:58px;
  display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s,transform .1s;}
.ans:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px);}
.ans .e{font-size:1.4rem;}
.back{margin-top:18px;background:none;border:none;color:var(--ink-soft);font:inherit;cursor:pointer;}
.result-badge{display:inline-block;background:var(--good-bg);color:var(--good);font-weight:700;border-radius:999px;padding:5px 14px;font-size:.85rem;margin-bottom:10px;}
.result-name{font-size:1.8rem;font-weight:700;margin:2px 0 6px;}
.result-why{color:var(--ink-soft);margin:0 0 22px;}
.go{min-height:60px;width:100%;font:inherit;font-weight:700;font-size:1.1rem;border:none;border-radius:999px;
  background:var(--accent);color:#fff;cursor:pointer;}
.go:hover{background:var(--accent-dark);}
.lang-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px;}
.lang-card{display:flex;align-items:center;gap:14px;text-align:left;background:var(--surface);border:2px solid var(--line);
  border-radius:var(--radius-m);padding:16px 18px;cursor:pointer;font:inherit;color:var(--ink);}
.lang-card:hover{border-color:var(--accent);background:var(--accent-soft);}
.lang-card.rec{border-color:var(--good);}
.lang-card .ic{flex:none;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);}
.lang-card .ic svg{width:26px;height:26px;}
.lang-card strong{display:block;font-size:1.08rem;}
.lang-card small{color:var(--ink-soft);}
.tag{margin-left:auto;font-size:.72rem;font-weight:700;color:var(--good);background:var(--good-bg);border-radius:999px;padding:3px 10px;}
.reset{display:block;margin:18px auto 0;background:none;border:1px solid var(--line);border-radius:999px;color:var(--ink-soft);font:inherit;padding:8px 16px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="mark">Sicher und selbstbestimmt im Internet<small>Alex und Tilda · Lern-Plattform</small></div>
  </div>
  <div id="app"></div>
  <button class="reset" onclick="go('start')">↺ Vorschau von vorn</button>
</div>

<script>
var app=document.getElementById("app");
var LEVELS={leicht:{name:"Leichte Sprache",desc:"Kurze Sätze. Mit Bildern.",ic:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h6M7 13h10M7 17h4"/>'},
 einfach:{name:"Einfache Sprache",desc:"Etwas mehr Text. Mit Beispielen.",ic:'<path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/><path d="M9 9h6M9 13h4"/>'},
 standard:{name:"Alltagssprache",desc:"Normaler Text für alle.",ic:'<path d="M6 3h9l4 4v14H6z"/><path d="M9 9h7M9 13h7M9 17h5"/>'}};
var QUESTIONS=[
 {q:"Wie magst du Texte am liebsten?",a:[["📝","Kurze Sätze mit Bildern","leicht"],["📄","Etwas mehr Text mit Beispielen","einfach"],["📰","Normale, längere Texte","standard"]]},
 {q:"Helfen dir Bilder beim Verstehen?",a:[["🖼️","Ja, sehr","leicht"],["🙂","Manchmal","einfach"],["🔤","Eher nicht","standard"]]},
 {q:"Liest du gern längere Texte?",a:[["⏱️","Lieber kurz","leicht"],["😌","Geht so","einfach"],["📚","Ja, gern","standard"]]}
];
var answers=[];
function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

function go(screen,data){
 if(screen==="start"){answers=[];
  app.innerHTML=`<div class="card">
    <h1>Womit möchtest du starten?</h1>
    <p class="sub">Du kannst gleich selbst wählen. Oder du beantwortest 3 kurze Fragen und bekommst einen Vorschlag.</p>
    <div class="choose-row">
      <button class="big" onclick="go('q',0)">
        <span class="ic">${svg('<path d="M12 3a9 9 0 1 0 9 9"/><path d="M21 3l-9 9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7M12 17h.01"/>')}</span>
        <span><strong>Hilf mir, die passende Sprache zu finden</strong><span>3 kurze Fragen · keine richtige oder falsche Antwort</span></span>
      </button>
      <button class="big" onclick="go('choose')">
        <span class="ic">${svg('<path d="M9 11l3 3 8-8"/><path d="M20 12v7H4V5h11"/>')}</span>
        <span><strong>Ich wähle selbst</strong><span>Direkt eine der drei Sprachen auswählen</span></span>
      </button>
    </div>
  </div>`;
 }
 else if(screen==="q"){var i=data;var Q=QUESTIONS[i];
  app.innerHTML=`<div class="card">
    <div class="dots">${QUESTIONS.map((_,j)=>'<span class="dot'+(j<=i?' on':'')+'"></span>').join("")}</div>
    <h2 class="qh">${Q.q}</h2>
    <div class="answers">
      ${Q.a.map((a,k)=>`<button class="ans" onclick="answer(${i},'${a[2]}')"><span class="e">${a[0]}</span> ${a[1]}</button>`).join("")}
    </div>
    ${i>0?`<button class="back" onclick="go('q',${i-1})">← Zurück</button>`:`<button class="back" onclick="go('start')">← Zurück</button>`}
  </div>`;
 }
 else if(screen==="result"){var lvl=data;var L=LEVELS[lvl];
  app.innerHTML=`<div class="card">
    <span class="result-badge">Unser Vorschlag für dich</span>
    <div class="result-name">${L.name}</div>
    <p class="result-why">${L.desc} Du kannst es jederzeit ändern.</p>
    <button class="go" onclick="alert('Würde mit '+'${L.name}'+' starten')">Los geht’s</button>
    <button class="ghost" onclick="go('choose','${lvl}')">Andere Sprache wählen</button>
  </div>`;
 }
 else if(screen==="choose"){var rec=data||null;
  app.innerHTML=`<div class="card">
    <h1>Wähle deine Sprache</h1>
    <p class="sub">Du kannst sie später jederzeit ändern.</p>
    <div class="lang-grid">
      ${Object.keys(LEVELS).map(k=>{var L=LEVELS[k];var isRec=k===rec;return `<button class="lang-card${isRec?' rec':''}" onclick="alert('Würde mit '+'${L.name}'+' starten')">
        <span class="ic">${svg(L.ic)}</span>
        <span><strong>${L.name}</strong><small>${L.desc}</small></span>
        ${isRec?'<span class="tag">Vorschlag</span>':''}
      </button>`;}).join("")}
    </div>
    <button class="back" onclick="go('start')">← Zurück</button>
  </div>`;
 }
}
function answer(i,lvl){
 answers[i]=lvl;
 if(i+1<QUESTIONS.length){go('q',i+1);}
 else{
   var t={leicht:0,einfach:0,standard:0};answers.forEach(a=>t[a]++);
   var best="einfach",max=-1;["leicht","einfach","standard"].forEach(k=>{if(t[k]>max){max=t[k];best=k;}});
   // Gleichstand → mittlere Stufe
   var top=Object.keys(t).filter(k=>t[k]===max);
   if(top.length>1)best=top.includes("einfach")?"einfach":top[0];
   go('result',best);
 }
}
go('start');
</script>
</body>
</html>
