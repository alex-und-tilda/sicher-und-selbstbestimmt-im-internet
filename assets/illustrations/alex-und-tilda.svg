<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Alex und Tilda begrüßen dich">
  <!-- Alex und Tilda – erwachsene Begleitfiguren, moderner Flat-Stil, Runde 3:
       markantere Silhouetten, individuellere Gesichter.
       Sanfte Animation; respektiert prefers-reduced-motion. -->
  <style>
    .figure-float { animation: figfloat 5s ease-in-out infinite; }
    .figure-float--b { animation-delay: 2.5s; }
    .wave-arm { transform-box: fill-box; transform-origin: 50% 92%; animation: wave 3.2s ease-in-out infinite; }
    @keyframes figfloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes wave {
      0%, 55%, 100% { transform: rotate(0deg); }
      65% { transform: rotate(-16deg); }
      75% { transform: rotate(10deg); }
      85% { transform: rotate(-12deg); }
      92% { transform: rotate(4deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .figure-float, .figure-float--b, .wave-arm { animation: none; }
    }
  </style>

  <!-- ruhiger Hintergrund -->
  <circle cx="180" cy="150" r="112" fill="#d8eaf2" opacity="0.45"/>
  <circle cx="62" cy="52" r="5" fill="#57a3c7" opacity="0.55"/>
  <circle cx="304" cy="64" r="4" fill="#15803d" opacity="0.45"/>
  <circle cx="326" cy="150" r="6" fill="#57a3c7" opacity="0.35"/>
  <circle cx="38" cy="160" r="4" fill="#0a5c95" opacity="0.3"/>

  <!-- Boden-Schatten -->
  <ellipse cx="122" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>
  <ellipse cx="242" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>

  <!-- ================= ALEX (links) ================= -->
  <g class="figure-float">
    <!-- winkender Arm (außen links): Oberarm -->
    <path d="M102 122 L86 104" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
    <g class="wave-arm">
      <path d="M86 104 L82 72" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
      <circle cx="81" cy="64" r="7" fill="#c68863"/>
    </g>

    <!-- Beine: dunkle Jeans, lässiger Stand -->
    <path d="M112 190 L108 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <path d="M132 190 L136 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <!-- Umschlag am Hosenbein -->
    <line x1="101" y1="252" x2="116" y2="253" stroke="#4a5f78" stroke-width="4"/>
    <line x1="128" y1="253" x2="143" y2="252" stroke="#4a5f78" stroke-width="4"/>
    <!-- Sneaker -->
    <path d="M98 262 L116 262 Q120 262 120 268 L120 270 L96 270 Q94 266 98 262 Z" fill="#e8eef4"/>
    <path d="M128 262 L146 262 Q150 266 148 270 L124 270 L124 268 Q124 262 128 262 Z" fill="#e8eef4"/>
    <line x1="96" y1="270" x2="148" y2="270" stroke="#33475c" stroke-width="2"/>
    <line x1="100" y1="265" x2="106" y2="265" stroke="#0a5c95" stroke-width="2"/>
    <line x1="138" y1="265" x2="144" y2="265" stroke="#0a5c95" stroke-width="2"/>

    <!-- Hoodie -->
    <path d="M104 196 C100 160 99 134 104 122 Q110 108 122 108 Q134 108 140 122 C145 134 144 160 140 196 Z" fill="#16222e"/>
    <!-- Kordeln -->
    <line x1="118" y1="124" x2="118" y2="138" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="126" y1="124" x2="126" y2="138" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Bauchtasche -->
    <path d="M112 168 L132 168 L128 184 L116 184 Z" fill="none" stroke="#33475c" stroke-width="2"/>

    <!-- ruhiger Arm (innen), Hand in der Tasche -->
    <path d="M139 124 C146 140 146 158 142 172" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>

    <!-- Kopfhörer um den Hals (markante Silhouette) -->
    <path d="M107 96 Q122 110 137 96" fill="none" stroke="#33475c" stroke-width="5" stroke-linecap="round"/>
    <circle cx="107" cy="96" r="5.5" fill="#33475c"/>
    <circle cx="137" cy="96" r="5.5" fill="#33475c"/>
    <circle cx="107" cy="96" r="2" fill="#57a3c7"/>
    <circle cx="137" cy="96" r="2" fill="#57a3c7"/>

    <!-- Hals + Kopf: weiche Kanten, männlicher Kiefer -->
    <rect x="116" y="90" width="12" height="12" rx="5" fill="#c68863"/>
    <path d="M106 76 L106 66 Q106 53 122 53 Q138 53 138 66 L138 76 Q138 91 122 91 Q106 91 106 76 Z" fill="#c68863"/>
    <!-- Ohren -->
    <circle cx="105.5" cy="72" r="3.4" fill="#c68863"/>
    <circle cx="138.5" cy="72" r="3.4" fill="#c68863"/>
    <!-- zerzauster Kurzhaarschnitt -->
    <path d="M105 66 Q105 51 122 51 Q139 51 139 66 Q139 62 135 60 L133 54 L128 59 L125 52 L121 58 L116 53 L113 59 Q107 60 105 66 Z" fill="#2a211c"/>
    <!-- Bart: kurzer Dreitagebart entlang des Kiefers -->
    <path d="M106 76 Q106 90 122 90 Q138 90 138 76 Q138 86 122 87 Q106 86 106 76 Z" fill="#2a211c" opacity="0.35"/>
    <!-- Brauen mit Ausdruck -->
    <path d="M111 65 L118 63.5" stroke="#2a211c" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M126 63.5 L133 65" stroke="#2a211c" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Augen -->
    <ellipse cx="115.5" cy="70.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <ellipse cx="128.5" cy="70.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <!-- Nase -->
    <path d="M122 70 L121 76 Q122.5 77.5 124.5 76.4" fill="none" stroke="#a96e4d" stroke-width="1.8" stroke-linecap="round"/>
    <!-- offenes Lächeln -->
    <path d="M115 81 Q122 86.5 129 81" fill="none" stroke="#16222e" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- ================= TILDA (rechts) ================= -->
  <g class="figure-float figure-float--b">
    <!-- winkender Arm (außen rechts): Oberarm -->
    <path d="M260 122 L276 104" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <g class="wave-arm">
      <path d="M276 104 L280 72" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
      <circle cx="281" cy="64" r="7" fill="#8a5a3b"/>
    </g>

    <!-- Hose: weites Bein -->
    <path d="M232 190 L228 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <path d="M252 190 L256 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <!-- Sneaker -->
    <path d="M218 262 L236 262 Q240 262 240 268 L240 270 L216 270 Q214 266 218 262 Z" fill="#e8eef4"/>
    <path d="M248 262 L266 262 Q270 266 268 270 L240 270 L240 268 Q244 262 248 262 Z" fill="#e8eef4"/>
    <line x1="216" y1="270" x2="268" y2="270" stroke="#2b3646" stroke-width="2"/>
    <line x1="220" y1="265" x2="226" y2="265" stroke="#d9a441" stroke-width="2"/>
    <line x1="258" y1="265" x2="264" y2="265" stroke="#d9a441" stroke-width="2"/>

    <!-- Blazer -->
    <path d="M224 196 C220 160 219 134 224 122 Q230 108 242 108 Q254 108 260 122 C265 134 264 160 260 196 Z" fill="#0a5c95"/>
    <!-- Top unterm Blazer: Senfgelb -->
    <path d="M235 110 L242 128 L249 110 Q242 105 235 110 Z" fill="#d9a441"/>
    <!-- Revers -->
    <path d="M235 110 L240 142" stroke="#08466f" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M249 110 L244 142" stroke="#08466f" stroke-width="2.6" stroke-linecap="round"/>
    <!-- aufgekrempelter Ärmel am Wink-Arm -->
    
    <!-- innerer Arm hält Smartphone -->
    <path d="M226 124 C220 140 220 152 226 160" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <circle cx="230" cy="163" r="6" fill="#8a5a3b"/>
    <rect x="226" y="146" width="15" height="26" rx="3.5" fill="#16222e"/>
    <rect x="228.5" y="150" width="10" height="16" rx="1.5" fill="#57a3c7"/>
    <!-- App-Punkte auf dem Bildschirm -->
    <circle cx="231.5" cy="154" r="1.2" fill="#ffffff"/>
    <circle cx="235.5" cy="154" r="1.2" fill="#ffffff"/>
    <circle cx="231.5" cy="158" r="1.2" fill="#ffffff"/>
    <circle cx="235.5" cy="158" r="1.2" fill="#ffffff"/>

    <!-- Hals + Kopf -->
    <rect x="236" y="90" width="12" height="12" rx="5" fill="#8a5a3b"/>
    <circle cx="242" cy="73" r="16" fill="#8a5a3b"/>
    <path d="M236 87 Q242 90.5 248 87 L246 90 L238 90 Z" fill="#8a5a3b"/>
    <!-- Ohren + Creolen -->
    <circle cx="226.5" cy="74" r="3.4" fill="#8a5a3b"/>
    <circle cx="257.5" cy="74" r="3.4" fill="#8a5a3b"/>
    <circle cx="225" cy="87" r="3.2" fill="none" stroke="#d9a441" stroke-width="2"/>
    <circle cx="259" cy="87" r="3.2" fill="none" stroke="#d9a441" stroke-width="2"/>
    <!-- große Locken-Silhouette -->
    <circle cx="224" cy="56" r="10" fill="#241b16"/>
    <circle cx="236" cy="46" r="11" fill="#241b16"/>
    <circle cx="250" cy="47" r="10" fill="#241b16"/>
    <circle cx="260" cy="56" r="9" fill="#241b16"/>
    <circle cx="263" cy="68" r="7" fill="#241b16"/>
    <circle cx="221" cy="67" r="7" fill="#241b16"/>
    <path d="M222 62 Q242 46 262 62 L262 70 Q242 56 222 70 Z" fill="#241b16"/>
    <!-- einzelne hellere Locken (Textur) -->
    <circle cx="231" cy="51" r="2.6" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <circle cx="247" cy="49" r="2.6" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <circle cx="257" cy="60" r="2.3" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <!-- runde goldene Brille -->
    <circle cx="235.5" cy="72.5" r="6.1" fill="none" stroke="#d9a441" stroke-width="1.9"/>
    <circle cx="248.5" cy="72.5" r="6.1" fill="none" stroke="#d9a441" stroke-width="1.9"/>
    <path d="M242.1 72.5 L241.9 72.5" stroke="#d9a441" stroke-width="2.2"/>
    <line x1="242" y1="71.5" x2="242" y2="71.5" stroke="#d9a441" stroke-width="2.2"/>
    <path d="M240 71.5 Q242 70 244 71.5" fill="none" stroke="#d9a441" stroke-width="2"/>
    <!-- Brauen -->
    <path d="M231 63.5 Q235.5 61.5 240 63.5" fill="none" stroke="#241b16" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M244 63.5 Q248.5 61.5 253 63.5" fill="none" stroke="#241b16" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Augen -->
    <ellipse cx="235.5" cy="72.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <ellipse cx="248.5" cy="72.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <!-- Nase -->
    <path d="M242 72 L241 77.5 Q242.5 79 244.5 77.8" fill="none" stroke="#6e4227" stroke-width="1.8" stroke-linecap="round"/>
    <!-- warmes Lächeln + Wangen -->
    <path d="M235 83 Q242 88 249 83" fill="none" stroke="#16222e" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="230" cy="79" r="2.6" fill="#c2603e" opacity="0.25"/>
    <circle cx="254" cy="79" r="2.6" fill="#c2603e" opacity="0.25"/>
  </g>
</svg>
