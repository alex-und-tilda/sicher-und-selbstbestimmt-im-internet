<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Alex und Tilda begrüßen dich">
  <!-- Alex und Tilda – erwachsene Begleitfiguren, moderner Flat-Stil, Runde 4:
       korrekte Anatomie mit sichtbarem Hals, Kopf frei über den Schultern.
       Sanfte Animation; respektiert prefers-reduced-motion. -->
  <style>
    .figure-float { animation: figfloat 5s ease-in-out infinite; }
    .figure-float--b { animation-delay: 2.5s; }
    .wave-arm { transform-box: fill-box; transform-origin: 50% 92%; animation: wave 3.2s ease-in-out infinite; }
    @keyframes figfloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes wave {
      0%, 55%, 100% { transform: rotate(0deg); }
      65% { transform: rotate(-16deg); }
      75% { transform: rotate(10deg); }
      85% { transform: rotate(-12deg); }
      92% { transform: rotate(4deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .figure-float, .figure-float--b, .wave-arm { animation: none; }
    }
  </style>

  <!-- ruhiger Hintergrund -->
  <circle cx="180" cy="150" r="112" fill="#d8eaf2" opacity="0.45"/>
  <circle cx="62" cy="52" r="5" fill="#57a3c7" opacity="0.55"/>
  <circle cx="304" cy="64" r="4" fill="#15803d" opacity="0.45"/>
  <circle cx="326" cy="150" r="6" fill="#57a3c7" opacity="0.35"/>
  <circle cx="38" cy="160" r="4" fill="#0a5c95" opacity="0.3"/>

  <!-- Boden-Schatten -->
  <ellipse cx="122" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>
  <ellipse cx="242" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>

  <!-- ================= ALEX (links) ================= -->
  <g class="figure-float">
    <!-- winkender Arm (außen links) -->
    <path d="M102 122 L86 104" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
    <g class="wave-arm">
      <path d="M86 104 L82 72" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
      <circle cx="81" cy="64" r="7" fill="#c68863"/>
    </g>

    <!-- Beine: dunkle Jeans -->
    <path d="M112 190 L108 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <path d="M132 190 L136 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <line x1="101" y1="252" x2="116" y2="253" stroke="#4a5f78" stroke-width="4"/>
    <line x1="128" y1="253" x2="143" y2="252" stroke="#4a5f78" stroke-width="4"/>
    <!-- Sneaker -->
    <path d="M98 262 L116 262 Q120 262 120 268 L120 270 L96 270 Q94 266 98 262 Z" fill="#e8eef4"/>
    <path d="M128 262 L146 262 Q150 266 148 270 L124 270 L124 268 Q124 262 128 262 Z" fill="#e8eef4"/>
    <line x1="96" y1="270" x2="148" y2="270" stroke="#33475c" stroke-width="2"/>
    <line x1="100" y1="265" x2="106" y2="265" stroke="#0a5c95" stroke-width="2"/>
    <line x1="138" y1="265" x2="144" y2="265" stroke="#0a5c95" stroke-width="2"/>

    <!-- Hals: sichtbar zwischen Kinn und Kragen -->
    <path d="M116 84 L128 84 L128 102 L116 102 Z" fill="#c68863"/>
    <path d="M116 98 Q122 103 128 98 L128 106 L116 106 Z" fill="#b0714f"/>

    <!-- Hoodie -->
    <path d="M104 196 C100 160 99 134 104 122 Q110 106 122 106 Q134 106 140 122 C145 134 144 160 140 196 Z" fill="#16222e"/>
    <!-- Kragen -->
    <path d="M112 108 Q122 116 132 108" fill="none" stroke="#33475c" stroke-width="4" stroke-linecap="round"/>
    <!-- Kordeln -->
    <line x1="118" y1="118" x2="118" y2="132" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="126" y1="118" x2="126" y2="132" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Bauchtasche -->
    <path d="M112 168 L132 168 L128 184 L116 184 Z" fill="none" stroke="#33475c" stroke-width="2"/>

    <!-- ruhiger Arm (innen), Hand in der Tasche -->
    <path d="M139 124 C146 140 146 158 142 172" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>

    <!-- Kopf: frei über den Schultern, männlicher Kiefer -->
    <path d="M106 68 L106 58 Q106 45 122 45 Q138 45 138 58 L138 68 Q138 84 122 84 Q106 84 106 68 Z" fill="#c68863"/>
    <!-- Ohren -->
    <circle cx="105.5" cy="65" r="3.4" fill="#c68863"/>
    <circle cx="138.5" cy="65" r="3.4" fill="#c68863"/>
    <!-- zerzauster Kurzhaarschnitt -->
    <path d="M105 58 Q105 43 122 43 Q139 43 139 58 Q139 54 135 52 L133 46 L128 51 L125 44 L121 50 L116 45 L113 51 Q107 52 105 58 Z" fill="#2a211c"/>
    <!-- Dreitagebart am Kiefer -->
    <path d="M106 68 Q106 83 122 83 Q138 83 138 68 Q138 78 122 80 Q106 78 106 68 Z" fill="#2a211c" opacity="0.35"/>
    <!-- Brauen -->
    <path d="M111 57 L118 55.5" stroke="#2a211c" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M126 55.5 L133 57" stroke="#2a211c" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Augen -->
    <ellipse cx="115.5" cy="62.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <ellipse cx="128.5" cy="62.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <!-- Nase -->
    <path d="M122 62 L121 68 Q122.5 69.5 124.5 68.4" fill="none" stroke="#a96e4d" stroke-width="1.8" stroke-linecap="round"/>
    <!-- offenes Lächeln -->
    <path d="M115 73 Q122 78.5 129 73" fill="none" stroke="#16222e" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Kopfhörer um den Hals (unter dem Kinn, über dem Kragen) -->
    <path d="M108 101 Q122 112 136 101" fill="none" stroke="#33475c" stroke-width="5" stroke-linecap="round"/>
    <circle cx="108" cy="101" r="5.5" fill="#33475c"/>
    <circle cx="136" cy="101" r="5.5" fill="#33475c"/>
    <circle cx="108" cy="101" r="2" fill="#57a3c7"/>
    <circle cx="136" cy="101" r="2" fill="#57a3c7"/>
  </g>

  <!-- ================= TILDA (rechts) ================= -->
  <g class="figure-float figure-float--b">
    <!-- winkender Arm (außen rechts) -->
    <path d="M260 122 L276 104" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <g class="wave-arm">
      <path d="M276 104 L280 72" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
      <circle cx="281" cy="64" r="7" fill="#8a5a3b"/>
    </g>

    <!-- Hose: weites Bein -->
    <path d="M232 190 L228 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <path d="M252 190 L256 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <!-- Sneaker -->
    <path d="M218 262 L236 262 Q240 262 240 268 L240 270 L216 270 Q214 266 218 262 Z" fill="#e8eef4"/>
    <path d="M248 262 L266 262 Q270 266 268 270 L240 270 L240 268 Q244 262 248 262 Z" fill="#e8eef4"/>
    <line x1="216" y1="270" x2="268" y2="270" stroke="#2b3646" stroke-width="2"/>
    <line x1="220" y1="265" x2="226" y2="265" stroke="#d9a441" stroke-width="2"/>
    <line x1="258" y1="265" x2="264" y2="265" stroke="#d9a441" stroke-width="2"/>

    <!-- Hals: sichtbar zwischen Kinn und Blazer -->
    <path d="M236 82 L248 82 L248 102 L236 102 Z" fill="#8a5a3b"/>
    <path d="M236 98 Q242 103 248 98 L248 106 L236 106 Z" fill="#734a30"/>

    <!-- Blazer -->
    <path d="M224 196 C220 160 219 134 224 122 Q230 106 242 106 Q254 106 260 122 C265 134 264 160 260 196 Z" fill="#0a5c95"/>
    <!-- Top unterm Blazer: Senfgelb -->
    <path d="M234 108 L242 126 L250 108 Q242 103 234 108 Z" fill="#d9a441"/>
    <!-- Revers -->
    <path d="M234 108 L240 140" stroke="#08466f" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M250 108 L244 140" stroke="#08466f" stroke-width="2.6" stroke-linecap="round"/>

    <!-- innerer Arm hält Smartphone -->
    <path d="M226 124 C220 140 220 152 226 160" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <circle cx="230" cy="163" r="6" fill="#8a5a3b"/>
    <rect x="226" y="146" width="15" height="26" rx="3.5" fill="#16222e"/>
    <rect x="228.5" y="150" width="10" height="16" rx="1.5" fill="#57a3c7"/>
    <circle cx="231.5" cy="154" r="1.2" fill="#ffffff"/>
    <circle cx="235.5" cy="154" r="1.2" fill="#ffffff"/>
    <circle cx="231.5" cy="158" r="1.2" fill="#ffffff"/>
    <circle cx="235.5" cy="158" r="1.2" fill="#ffffff"/>

    <!-- Kopf: frei über den Schultern -->
    <circle cx="242" cy="66" r="16" fill="#8a5a3b"/>
    <!-- Ohren + Creolen -->
    <circle cx="226.5" cy="67" r="3.4" fill="#8a5a3b"/>
    <circle cx="257.5" cy="67" r="3.4" fill="#8a5a3b"/>
    <circle cx="225" cy="78" r="3.2" fill="none" stroke="#d9a441" stroke-width="2"/>
    <circle cx="259" cy="78" r="3.2" fill="none" stroke="#d9a441" stroke-width="2"/>
    <!-- große Locken-Silhouette -->
    <circle cx="224" cy="49" r="10" fill="#241b16"/>
    <circle cx="236" cy="39" r="11" fill="#241b16"/>
    <circle cx="250" cy="40" r="10" fill="#241b16"/>
    <circle cx="260" cy="49" r="9" fill="#241b16"/>
    <circle cx="263" cy="61" r="7" fill="#241b16"/>
    <circle cx="221" cy="60" r="7" fill="#241b16"/>
    <path d="M222 55 Q242 39 262 55 L262 63 Q242 49 222 63 Z" fill="#241b16"/>
    <!-- Locken-Textur -->
    <circle cx="231" cy="44" r="2.6" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <circle cx="247" cy="42" r="2.6" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <circle cx="257" cy="53" r="2.3" fill="none" stroke="#4a3a2e" stroke-width="1.3" opacity="0.8"/>
    <!-- runde goldene Brille -->
    <circle cx="235.5" cy="65.5" r="6.1" fill="none" stroke="#d9a441" stroke-width="1.9"/>
    <circle cx="248.5" cy="65.5" r="6.1" fill="none" stroke="#d9a441" stroke-width="1.9"/>
    <path d="M240 64.5 Q242 63 244 64.5" fill="none" stroke="#d9a441" stroke-width="2"/>
    <!-- Brauen -->
    <path d="M231 56.5 Q235.5 54.5 240 56.5" fill="none" stroke="#241b16" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M244 56.5 Q248.5 54.5 253 56.5" fill="none" stroke="#241b16" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Augen -->
    <ellipse cx="235.5" cy="65.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <ellipse cx="248.5" cy="65.5" rx="2.1" ry="2.7" fill="#16222e"/>
    <!-- Nase -->
    <path d="M242 65 L241 70.5 Q242.5 72 244.5 70.8" fill="none" stroke="#6e4227" stroke-width="1.8" stroke-linecap="round"/>
    <!-- warmes Lächeln + Wangen -->
    <path d="M235 76 Q242 81 249 76" fill="none" stroke="#16222e" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="230" cy="72" r="2.6" fill="#c2603e" opacity="0.25"/>
    <circle cx="254" cy="72" r="2.6" fill="#c2603e" opacity="0.25"/>
  </g>
</svg>
