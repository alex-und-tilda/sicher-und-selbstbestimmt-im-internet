<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Alex und Tilda begrüßen dich">
  <!-- Alex und Tilda – erwachsene Begleitfiguren, moderner Flat-Stil.
       Sanfte Animation (Winken, leichtes Schweben); respektiert
       prefers-reduced-motion. Farben angelehnt ans Design-System. -->
  <style>
    .figure-float { animation: figfloat 5s ease-in-out infinite; }
    .figure-float--b { animation-delay: 2.5s; }
    .wave-arm { transform-box: fill-box; transform-origin: 50% 92%; animation: wave 3.2s ease-in-out infinite; }
    @keyframes figfloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes wave {
      0%, 55%, 100% { transform: rotate(0deg); }
      65% { transform: rotate(-16deg); }
      75% { transform: rotate(10deg); }
      85% { transform: rotate(-12deg); }
      92% { transform: rotate(4deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .figure-float, .figure-float--b, .wave-arm { animation: none; }
    }
  </style>

  <!-- ruhiger Hintergrund -->
  <circle cx="180" cy="150" r="112" fill="#d8eaf2" opacity="0.45"/>
  <circle cx="62" cy="52" r="5" fill="#57a3c7" opacity="0.55"/>
  <circle cx="304" cy="64" r="4" fill="#15803d" opacity="0.45"/>
  <circle cx="326" cy="150" r="6" fill="#57a3c7" opacity="0.35"/>
  <circle cx="38" cy="160" r="4" fill="#0a5c95" opacity="0.3"/>

  <!-- Boden-Schatten -->
  <ellipse cx="122" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>
  <ellipse cx="242" cy="276" rx="52" ry="7" fill="#0a5c95" opacity="0.08"/>

  <!-- ================= ALEX (links) ================= -->
  <g class="figure-float">
    <!-- winkender Arm (außen links): Oberarm -->
    <path d="M102 122 L86 104" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
    <!-- Unterarm + Hand, animiert um den Ellenbogen -->
    <g class="wave-arm">
      <path d="M86 104 L82 72" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>
      <circle cx="81" cy="64" r="7" fill="#c68863"/>
    </g>

    <!-- Beine: dunkle Jeans -->
    <path d="M112 190 L110 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <path d="M132 190 L134 262" fill="none" stroke="#33475c" stroke-width="16" stroke-linecap="round"/>
    <!-- Sneaker -->
    <path d="M100 262 L118 262 Q122 262 122 268 L122 270 L98 270 Q96 266 100 262 Z" fill="#e8eef4"/>
    <path d="M126 262 L144 262 Q148 266 146 270 L122 270 L122 268 Q122 262 126 262 Z" fill="#e8eef4"/>
    <line x1="98" y1="270" x2="146" y2="270" stroke="#33475c" stroke-width="2"/>

    <!-- Hoodie: schlanker Torso mit Schultern -->
    <path d="M104 196 C100 160 99 134 104 122 Q110 108 122 108 Q134 108 140 122 C145 134 144 160 140 196 Z" fill="#16222e"/>
    <!-- Kapuze angedeutet -->
    <path d="M108 116 Q122 126 136 116 Q130 106 122 106 Q114 106 108 116 Z" fill="#0a5c95"/>
    <!-- Kordeln -->
    <line x1="118" y1="122" x2="118" y2="136" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="126" y1="122" x2="126" y2="136" stroke="#d8eaf2" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Bauchtasche -->
    <path d="M112 168 L132 168 L128 184 L116 184 Z" fill="none" stroke="#33475c" stroke-width="2"/>

    <!-- ruhiger Arm (innen), Hand in der Tasche -->
    <path d="M139 124 C146 140 146 158 142 172" fill="none" stroke="#16222e" stroke-width="11" stroke-linecap="round"/>

    <!-- Hals + Kopf: erwachsene Proportion -->
    <rect x="116" y="92" width="12" height="12" rx="5" fill="#c68863"/>
    <circle cx="122" cy="74" r="16" fill="#c68863"/>
    <!-- Ohren -->
    <circle cx="106.5" cy="75" r="3.4" fill="#c68863"/>
    <circle cx="137.5" cy="75" r="3.4" fill="#c68863"/>
    <!-- moderner kurzer Schnitt -->
    <path d="M106 72 Q106 56 122 56 Q138 56 138 72 Q138 66 132 63 Q124 59 112 63 Q106 66 106 72 Z" fill="#2a211c"/>
    <!-- Bartschatten -->
    <path d="M110 84 Q122 94 134 84 Q132 90 122 91 Q112 90 110 84 Z" fill="#2a211c" opacity="0.18"/>
    <!-- Gesicht: dezent -->
    <circle cx="116" cy="74" r="1.9" fill="#16222e"/>
    <circle cx="128" cy="74" r="1.9" fill="#16222e"/>
    <path d="M113 68.5 L119 68.5" stroke="#2a211c" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M125 68.5 L131 68.5" stroke="#2a211c" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M117 82 Q122 85 127 82" fill="none" stroke="#16222e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ================= TILDA (rechts) ================= -->
  <g class="figure-float figure-float--b">
    <!-- winkender Arm (außen rechts): Oberarm -->
    <path d="M260 122 L276 104" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <g class="wave-arm">
      <path d="M276 104 L280 72" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
      <circle cx="281" cy="64" r="7" fill="#8a5a3b"/>
    </g>

    <!-- Hose: weites Bein -->
    <path d="M232 190 L228 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <path d="M252 190 L256 262" fill="none" stroke="#2b3646" stroke-width="17" stroke-linecap="round"/>
    <!-- Sneaker -->
    <path d="M218 262 L236 262 Q240 262 240 268 L240 270 L216 270 Q214 266 218 262 Z" fill="#e8eef4"/>
    <path d="M248 262 L266 262 Q270 266 268 270 L240 270 L240 268 Q244 262 248 262 Z" fill="#e8eef4"/>
    <line x1="216" y1="270" x2="268" y2="270" stroke="#2b3646" stroke-width="2"/>

    <!-- Blazer -->
    <path d="M224 196 C220 160 219 134 224 122 Q230 108 242 108 Q254 108 260 122 C265 134 264 160 260 196 Z" fill="#0a5c95"/>
    <!-- Top unterm Blazer -->
    <path d="M236 110 L242 124 L248 110 Q242 106 236 110 Z" fill="#d8eaf2"/>
    <!-- Revers -->
    <path d="M236 110 L240 140" stroke="#08466f" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M248 110 L244 140" stroke="#08466f" stroke-width="2.4" stroke-linecap="round"/>

    <!-- innerer Arm hält Smartphone -->
    <path d="M226 124 C220 140 220 152 226 160" fill="none" stroke="#0a5c95" stroke-width="11" stroke-linecap="round"/>
    <circle cx="230" cy="163" r="6" fill="#8a5a3b"/>
    <rect x="226" y="146" width="15" height="26" rx="3.5" fill="#16222e"/>
    <rect x="228.5" y="150" width="10" height="16" rx="1.5" fill="#57a3c7"/>

    <!-- Hals + Kopf -->
    <rect x="236" y="92" width="12" height="12" rx="5" fill="#8a5a3b"/>
    <circle cx="242" cy="74" r="16" fill="#8a5a3b"/>
    <!-- Ohren + Creolen -->
    <circle cx="226.5" cy="75" r="3.4" fill="#8a5a3b"/>
    <circle cx="257.5" cy="75" r="3.4" fill="#8a5a3b"/>
    <circle cx="226.5" cy="83" r="3.6" fill="none" stroke="#d9a441" stroke-width="2"/>
    <circle cx="257.5" cy="83" r="3.6" fill="none" stroke="#d9a441" stroke-width="2"/>
    <!-- moderner Locken-Bob -->
    <circle cx="230" cy="60" r="9" fill="#241b16"/>
    <circle cx="241" cy="55" r="10" fill="#241b16"/>
    <circle cx="252" cy="59" r="9" fill="#241b16"/>
    <circle cx="257" cy="68" r="7" fill="#241b16"/>
    <circle cx="226" cy="68" r="7" fill="#241b16"/>
    <path d="M226 62 Q242 50 258 62 L258 70 Q242 58 226 70 Z" fill="#241b16"/>
    <!-- Gesicht -->
    <circle cx="236" cy="74" r="1.9" fill="#16222e"/>
    <circle cx="248" cy="74" r="1.9" fill="#16222e"/>
    <path d="M233 68.5 L239 68.5" stroke="#241b16" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M245 68.5 L251 68.5" stroke="#241b16" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M237 82 Q242 85 247 82" fill="none" stroke="#16222e" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
