  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((reg) => {
          /* Wenn ein neues SW wartet, Banner anzeigen */
          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
        }).catch(() => {});

        /* Seite benachrichtigt uns, dass SW aktiviert wurde */
        navigator.serviceWorker.addEventListener("message", (e) => {
          if (e.data && e.data.type === "SW_UPDATED") showUpdateBanner();
        });
      });
    }

    function showUpdateBanner() {
      const existing = document.getElementById("updateBanner");
      if (existing) return;
      const banner = document.createElement("div");
      banner.id = "updateBanner";
      banner.className = "update-banner";
      banner.setAttribute("role", "status");
      banner.innerHTML = `
        <span>✓ Die Lernplattform wurde aktualisiert.</span>
        <button type="button" onclick="location.reload()">Neu laden</button>
        <button type="button" class="update-banner-close" aria-label="Banner schließen" onclick="this.closest('.update-banner').remove()">✕</button>
      `;
      document.body.prepend(banner);
    }
  </script>
